# =============================================================================
# Nginx config for UniEvent PHP Slim 4 on Render
# -----------------------------------------------------------------------------
# - Listens on port 10000 (Render's default for Docker web services)
# - Document root = /var/www/html/public (Slim's front controller)
# - All unknown routes fall through to /index.php (Slim's router handles them)
# - Static files (if any) are served directly when found under public/
# =============================================================================

server {
    listen 10000;
    server_name _;
    root  /var/www/html/public;
    index index.php index.html;

    # Max upload size — keeps Nginx from rejecting large JSON payloads
    client_max_body_size 10m;

    # ── Slim's front controller: try static file, then fall back to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Run all .php files through PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_param  PATH_INFO $fastcgi_path_info;
    }

    # ── Deny dotfiles (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
